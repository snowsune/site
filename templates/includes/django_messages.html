{% if messages %}
{# Consumed by base.html → notifications.js as toasts; kept off-screen until then #}
<div class="django-messages-bridge" aria-live="polite" hidden>
  {% for message in messages %}
  <div class="message message-{{ message.level_tag }}">
    <span class="message-text">{{ message }}</span>
  </div>
  {% endfor %}
</div>
{% endif %}
